{% extends "base.html" %}

{% block content %}
<div class="login-container">
    <h1>Admin Login</h1>
    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}
    <form method="post">
        <label>Username: <input type="text" name="username" required></label>
        <label>Password: <input type="password" name="password" required></label>
        <button type="submit">Login</button>
    </form>
</div>
{% endblock %}
