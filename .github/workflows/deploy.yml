name: Deploy to PythonAnywhere

on:
  push:
    branches:
      - dev
      - test
  pull_request:
    types: [closed]
    branches:
      - test

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./SermonManager
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Deploy
        uses: umuttopalak/pythonanywhere-deploy-action@v1.1.2
        with:
          host: 'www.pythonanywhere.com'
          username: ${{ secrets.USERNAME }}
          api_token: ${{ secrets.PYTHONANYWHERE_API_TOKEN }}
